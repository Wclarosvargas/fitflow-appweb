<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FitFlow - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <main class="login-page">

        <section class="container-fluid">

            <div class="row justify-content-center">

                <div class="col-12 col-sm-10 col-md-6 col-lg-4">

                    <div class="login-container">

                        <!-- Logo -->

                        <div class="text-center mb-5">

                            <img src="assets/imgs/pesa.png" alt="Logo FitFlow" class="logo">

                            <h1 class="fitflow-title">
                                FITFLOW
                            </h1>

                            <p class="fitflow-subtitle">
                                BARRACAS
                            </p>

                        </div>

                        <!-- Formulario -->

                        <form id="loginForm">

                            <div class="mb-4">

                                <label for="email" class="form-label">

                                    Email

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text fitflow-icon">

                                        <i class="bi bi-envelope"></i>

                                    </span>

                                    <input type="email" id="email" class="form-control fitflow-input"
                                        placeholder="tu@email.com" required>

                                </div>

                            </div>

                            <div class="mb-2">

                                <label for="password" class="form-label">

                                    Contraseña

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text fitflow-icon">

                                        <i class="bi bi-lock"></i>

                                    </span>

                                    <input type="password" id="password" class="form-control fitflow-input"
                                        placeholder="********" required>

                                    <span class="input-group-text fitflow-icon">

                                        <i class="bi bi-eye-slash"></i>

                                    </span>

                                </div>

                            </div>

                            <div class="text-end mb-5">

                                <a href="#" class="forgot-password">

                                    ¿Olvidaste tu contraseña?

                                </a>

                            </div>

                            <button type="submit" class="btn btn-login w-100">

                                INICIAR SESIÓN

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <script src="assets/js/login.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
