<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow - Reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body style="background-color: #121212; color: white;">

<main class="dashboard-page" style="min-height: 100vh; padding: 20px; padding-bottom: 90px;">

    <h1 class="visually-hidden">Reservas de Clases - FitFlow Barracas</h1>

    <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="d-flex justify-content-center align-items-center me-2" style="width: 35px; height: 35px; background-color: #a5f3c3; border-radius: 50%;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#121212" viewBox="0 0 16 16" style="transform: rotate(-45deg);">
                    <path d="M14.5 6a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-1zm-13 0a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-1zm3-1.5a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5h-2zm6 0a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5h-2zm-4 3.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </div>
            <h2 class="h5 mb-0" style="font-weight: bold; font-size: 1.1rem;">FitFlow Barracas</h2>
        </div>
        <div>
            <i class="bi bi-bell me-3" style="font-size: 1.2rem; cursor: pointer;"></i>
            <i class="bi bi-gear" style="font-size: 1.2rem; cursor: pointer;"></i>
        </div>
    </header>

    <section>
        <h2 class="h4" style="font-weight: bold; margin-bottom: 5px;">Reservar Clase</h2>
        <p style="color: #888; font-size: 0.85rem; margin-bottom: 20px;">Selecciona un día y horario para tu sesión.</p>

        <div class="date-scroll-container mb-4" id="contenedorFechas">
            </div>

        <div class="d-flex gap-2 mb-4 overflow-auto scroll-oculto">
            <span class="badge rounded-pill bg-secondary text-white px-3 py-2 d-flex align-items-center gap-1" style="cursor: pointer;">
                <i class="bi bi-funnel"></i> TODOS
            </span>
            <span class="badge rounded-pill px-3 py-2" style="background-color: #1e1e1e; border: 1px solid #2c2c2e; font-weight: normal; cursor: pointer;">CROSSFIT</span>
            <span class="badge rounded-pill px-3 py-2" style="background-color: #1e1e1e; border: 1px solid #2c2c2e; font-weight: normal; cursor: pointer;">YOGA</span>
        </div>

        <div id="listaClases" class="mb-4">
            </div>

        <button id="btnConfirmarReserva" class="btn w-100 mt-2 mb-4" style="background-color: #a5f3c3; color: #121212; font-weight: bold; border-radius: 8px; padding: 12px;">
            CONFIRMAR RESERVA
        </button>

    </section>

</main>

</body>
</html>
