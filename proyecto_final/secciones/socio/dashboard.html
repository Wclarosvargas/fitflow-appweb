<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow - Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

    <main class="dashboard-page">

        <h1 class="visually-hidden">Inicio - FitFlow Barracas</h1>

        <section class="container-fluid">
            <header class="dashboard-header">
                <div>
                    <small class="text-secondary">Hola,</small>
                    <h2 id="nombreUsuario">Socio</h2>
                </div>

                <button class="profile-btn" aria-label="Perfil">
                    <i class="bi bi-person-circle"></i>
                </button>
            </header>

            <article class="fitflow-card">
                <div class="d-flex justify-content-between">
                    <h3 class="h6">Aforo Actual</h3>
                    <i class="bi bi-people-fill"></i>
                </div>

                <div class="occupancy-number">
                    65%
                </div>

                <p class="text-secondary">Ocupado</p>

                <div class="progress">
                    <div class="progress-bar occupancy-bar" style="width:65%"></div>
                </div>
            </article>

            <article class="fitflow-card">
                <h3 class="h6 mb-3">Estado de Cuenta</h3>
                <span class="status-active">
                    <i class="bi bi-check-circle-fill"></i> ACTIVO
                </span>
            </article>

            <article class="fitflow-card">
                <h3 class="h6">Próxima Clase</h3>
                <div class="d-flex justify-content-between align-items-center">
                    <span>CrossFit WOD</span>
                    <strong>18:30</strong>
                </div>
            </article>

        </section>

    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="active-nav">
            <i class="bi bi-house-fill"></i>
            <span>Inicio</span>
        </a>

        <a href="rutina.html">
            <i class="bi bi-clipboard-check"></i>
            <span>Rutina</span>
        </a>

        <a href="qr.html">
            <i class="bi bi-qr-code"></i>
            <span>QR</span>
        </a>

        <a href="#">
            <i class="bi bi-cash-stack"></i>
            <span>Pagos</span>
        </a>

        <a href="reservas.html">
            <i class="bi bi-calendar-event"></i>
            <span>Reservas</span>
        </a>

        <a href="perfil.html">
            <i class="bi bi-person"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="../../assets/js/dashboard.js"></script>

</body>
</html>
