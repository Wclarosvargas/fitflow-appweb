<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow - Pase QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body style="background-color: #121212; color: white;">

    <main class="dashboard-page" style="min-height: 100vh; padding: 20px; padding-bottom: 90px;">

        <h1 class="visually-hidden">Pase QR - FitFlow Barracas</h1>

        <header class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <div class="d-flex justify-content-center align-items-center me-2" style="width: 35px; height: 35px; background-color: #a5f3c3; border-radius: 50%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#121212" viewBox="0 0 16 16" style="transform: rotate(-45deg);">
                        <path d="M14.5 6a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-1zm-13 0a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-1zm3-1.5a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5h-2zm6 0a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5h-2zm-4 3.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5z"/>
                    </svg>
                </div>
                <h2 class="h5 mb-0" style="font-weight: bold; font-size: 1.1rem;">FitFlow Barracas</h2>
            </div>
            <div>
                <i class="bi bi-bell me-3" style="font-size: 1.2rem; cursor: pointer;"></i>
                <i class="bi bi-gear" style="font-size: 1.2rem; cursor: pointer;"></i>
            </div>
        </header>

        <section class="qr-main-card d-flex flex-column align-items-center">

            <div class="profile-img-container mb-2">
                <img src="https://i.pravatar.cc/150?img=47" alt="Perfil" class="profile-img">
            </div>
            <h3 class="h4 mb-0" style="font-weight: 600;">Ana Martinez</h3>
            <span style="color: #888; font-size: 0.85rem; letter-spacing: 1px;">SOCIO #8492</span>

            <div class="status-badge mt-2 mb-4">
                <i class="bi bi-circle-fill"></i> ACTIVO
            </div>

            <div class="qr-box bg-white rounded-4 p-3 mb-4 w-100 d-flex justify-content-center align-items-center"
                style="max-width: 280px; min-height: 250px;">
                <div id="contenedorQR"></div>
            </div>

            <p class="text-uppercase mb-4"
                style="color: #888; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">
                Mostrar QR en molinete
            </p>

            <div class="plan-info-box d-flex justify-content-between w-100">
                <div class="text-start">
                    <span class="d-block" style="color: #888; font-size: 0.7rem; letter-spacing: 1px;">PLAN</span>
                    <span style="font-weight: 600; font-size: 1rem;">Mensual</span>
                </div>

                <div class="divider"></div>

                <div class="text-end">
                    <span class="d-block" style="color: #888; font-size: 0.7rem; letter-spacing: 1px;">VENCE</span>
                    <span style="font-weight: 600; font-size: 1rem;">30 Nov</span>
                </div>
            </div>

        </section>

    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html">
            <i class="bi bi-house"></i>
            <span>Inicio</span>
        </a>
        <a href="rutina.html">
            <i class="bi bi-clipboard"></i>
            <span>Rutinas</span>
        </a>
        <a href="qr.html" class="active-nav">
            <i class="bi bi-qr-code-scan"></i>
            <span>QR</span>
        </a>
        <a href="#">
            <i class="bi bi-cash-stack"></i>
            <span>Pagos</span>
        </a>
        <a href="reservas.html">
            <i class="bi bi-calendar-event"></i>
            <span>Reservas</span>
        </a>
        <a href="perfil.html">
            <i class="bi bi-person"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../../assets/js/qr.js"></script>

</body>
</html>
