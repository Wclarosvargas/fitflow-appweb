    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<main class="dashboard-page">

    <h1 class="visually-hidden">Rutina de Entrenamiento - FitFlow Barracas</h1>

    <section class="container-fluid">

        <header class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="h4 mb-0">Tren Superior - Día 1</h2>
                <i class="bi bi-three-dots-vertical" style="color: #888; font-size: 1.25rem; cursor: pointer;"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3 mb-1">
                <span style="font-size: 0.75rem; color: #888; letter-spacing: 1px; font-weight: 600;">PROGRESO</span>
                <span id="progresoTexto" style="color: #6fcf97; font-weight: bold; font-size: 0.9rem;">0/3</span>
            </div>

            <div class="progress" style="height: 6px; background-color: #2c2c2e;">
                <div
                    id="barraProgreso"
                    class="progress-bar occupancy-bar"
                    style="width: 0%; background-color: #6fcf97; transition: width 0.3s ease;">
                </div>
            </div>
        </header>

        <div id="listaEjercicios">
            </div>

        <button
            id="btnCompletar"
            class="btn btn-login w-100 mt-4">
            COMPLETAR ENTRENAMIENTO
        </button>

    </section>

</main>
