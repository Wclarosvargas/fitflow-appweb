<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow - Clases Profesor</title>

   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@200;300;400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body style="background-color: #121212; color: white;">

<main class="dashboard-page" style="min-height: 100vh; padding: 20px; padding-bottom: 90px;">

  
    <h1 class="visually-hidden">FitFlow Barracas - Panel del profesor</h1>

    <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
          
            <div class="d-flex justify-content-center align-items-center me-2"
                style="width: 35px; height: 35px; background-color: #a5f3c3; border-radius: 50%;" aria-hidden="true">
                <i class="bi bi-dumbbell" style="color: #121212; font-size: 1.1rem; transform: rotate(-45deg);"></i>
            </div>
            <h2 class="mb-0" style="font-weight: bold; font-size: 1.1rem;">FitFlow Barracas</h2>
        </div>
        <div>
          
            <i class="bi bi-bell me-3" style="font-size: 1.2rem; cursor: pointer;" role="button" tabindex="0" aria-label="Notificaciones"></i>
            <i class="bi bi-gear" style="font-size: 1.2rem; cursor: pointer;" role="button" tabindex="0" aria-label="Configuración de la cuenta"></i>
        </div>
    </header>

    <section class="mb-4">
        <h3 style="font-weight: bold; margin-bottom: 2px;">Hola, Prof. Marcos</h3>
        <p style="color: #888; font-size: 0.9rem;">Resumen de tu clase de hoy</p>
    </section>

  
    <section class="mb-4">
        <h3 class="visually-hidden">Resumen de clase</h3>

        <div class="row gx-2">
            <div class="col-6">
                <div class="tarjeta-oscura p-3 rounded-4 h-100">
                    <small style="color: #888; font-size: 0.75rem; letter-spacing: 0.5px; display: block; margin-bottom: 8px;" aria-hidden="true">
                        <i class="bi bi-people-fill me-1"></i> ASISTENCIA
                    </small>
                    <div class="d-flex justify-content-between align-items-end">
                        <span style="font-size: 1.5rem; font-weight: bold;">
                            24<span style="font-size: 1rem; color: #888;">/30</span>
                        </span>
                        <span class="badge" style="background-color: #0f5132; color: #a5f3c3;">+80%</span>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <div class="tarjeta-oscura p-3 rounded-4 h-100">
                    <small style="color: #888; font-size: 0.75rem; letter-spacing: 0.5px; display: block; margin-bottom: 8px;" aria-hidden="true">
                        <i class="bi bi-clock-history me-1"></i> PRÓXIMA CLASE
                    </small>
                    <div class="d-flex flex-column">
                        <span style="font-size: 1.2rem; font-weight: bold;">18:30</span>
                        <small style="color: #888; font-size: 0.75rem;">CrossFit Avanzado</small>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="search-bar mb-4 position-relative">
        <i class="bi bi-search position-absolute" aria-hidden="true"
            style="left: 15px; top: 50%; transform: translateY(-50%); color: #888;"></i>
      
        <input type="text" id="buscadorAlumnos" class="form-control"
            placeholder="Buscar alumno..." aria-label="Buscar alumno"
            style="background-color: #1e1e1e; border: none; color: white; padding-left: 45px; border-radius: 12px; height: 45px;">
    </div>


    <section>
        <h4 style="font-weight: 600; margin-bottom: 12px;">Alumnos registrados</h4>

        <div id="listaAlumnos"></div>
    </section>

</main>

<nav class="bottom-nav">
    <a href="#"><i class="bi bi-house"></i><span>Inicio</span></a>
    <a href="clases.html" class="active-nav"><i class="bi bi-backpack"></i><span>Clases</span></a>
    <a href="#"><i class="bi bi-clipboard"></i><span>Rutinas</span></a>
    <a href="#"><i class="bi bi-calendar-event"></i><span>Agenda</span></a>
    <a href="#"><i class="bi bi-person"></i><span>Perfil</span></a>
</nav>


<script src="../../assets/js/clases.js" defer></script>

</body>
</html>
